<!DOCTYPE html>
<html lang=\"en\">
<head>
<meta charset=\"UTF-8\" />
<title>Mini Snake</title>
<style>
  body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#111; }
  canvas { background:#222; border:2px solid #555; }
</style>
</head>
<body>
<canvas id=\"game\" width=\"400\" height=\"400\"></canvas>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const grid = 20;                // size of each cell (pixels)
  const cols = canvas.width / grid; // 20 columns
  const rows = canvas.height / grid; // 20 rows

  let snake = [{x:10, y:10}];      // start in the middle
  let dir = {x:1, y:0};           // moving right initially
  let food = {x:5, y:5};
  const speed = 100;              // ms per frame

  function drawCell(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x*grid, y*grid, grid-1, grid-1);
  }

  function placeFood() {
    food.x = Math.floor(Math.random()*cols);
    food.y = Math.floor(Math.random()*rows);
  }

  function step() {
    // compute new head position (wrap around edges)
    const head = {
      x: (snake[0].x + dir.x + cols) % cols,
      y: (snake[0].y + dir.y + rows) % rows
    };
    // self‑collision → reset to start
    for (const seg of snake) {
      if (seg.x===head.x && seg.y===head.y) {
        snake = [{x:10, y:10}];
        dir = {x:1, y:0};
        placeFood();
        return;
      }
    }
    snake.unshift(head);
    // eat food?
    if (head.x===food.x && head.y===food.y) {
      placeFood(); // grow (do not pop tail)
    } else {
      snake.pop(); // move without growing
    }
    // render
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawCell(food.x, food.y, '#e74c3c'); // red food
    snake.forEach((seg,i)=> drawCell(seg.x, seg.y, i===0? '#2ecc71' : '#27ae60'));
  }

  // keyboard controls – arrow keys only
  document.addEventListener('keydown', e => {
    if (e.key==='ArrowUp'    && dir.y===0) dir={x:0, y:-1};
    else if (e.key==='ArrowDown' && dir.y===0) dir={x:0, y:1};
    else if (e.key==='ArrowLeft' && dir.x===0) dir={x:-1, y:0};
    else if (e.key==='ArrowRight'&& dir.x===0) dir={x:1,  y:0};
  });

  // start the game loop
  setInterval(step, speed);
</script>
</body>
</html>
